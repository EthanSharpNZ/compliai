<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>CompliAI — SSSP sign-off</title>
<link rel="icon" href="favicon.svg?v=2" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--paper:#F3F3EF;--surface:#FFFFFF;--ink:#1A1B17;--ink-soft:#62655C;--line:#E3E3DB;--hazard:#E2540B;--hazard-tint:#FBEDE3;--steel:#243137;--brand:#0F766E;--brand-deep:#0B5A54;--brand-tint:#E6F2F0;--good:#2F6B4F;}
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;}
  .display{font-family:'Archivo',sans-serif;}
  header{position:sticky;top:0;z-index:40;background:var(--steel);color:#fff;border-bottom:3px solid var(--brand);}
  .bar{max-width:640px;margin:0 auto;padding:13px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;}
  .brand-logo{height:26px;width:auto;display:block;}
  .bar a{color:#C3CDD2;text-decoration:none;font-size:13px;}
  .wrap{max-width:640px;margin:0 auto;padding:22px 18px 90px;}
  h1{font-family:'Archivo';font-weight:800;font-size:22px;margin:0 0 4px;}
  .sub{color:var(--ink-soft);font-size:14px;margin:0 0 20px;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px;}
  label{display:block;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px;}
  input,select,textarea{width:100%;font-family:inherit;font-size:16px;padding:12px 13px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--brand);border-color:var(--brand);}
  textarea{min-height:80px;resize:vertical;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .field{margin-bottom:14px;}
  .btn{font-family:'Archivo';font-weight:700;font-size:15px;background:var(--brand);color:#fff;border:none;border-radius:10px;padding:14px 18px;cursor:pointer;width:100%;}
  .btn:hover{filter:brightness(1.06);}
  .btn:disabled{opacity:.6;}
  .btn.alt{background:transparent;color:var(--brand-deep);border:1.5px solid var(--line);}
  .btn.mini{width:auto;padding:8px 13px;font-size:13px;}
  .err{background:var(--hazard-tint);color:#9a3a08;border-radius:10px;padding:12px 14px;font-size:14px;margin-top:12px;}
  .hide{display:none;}
  .ok-screen{text-align:center;padding:30px 10px;}
  .ok-screen .tick{font-size:44px;color:var(--good);}
  .sig-canvas{width:100%;height:180px;border:1.5px dashed var(--line);border-radius:10px;background:#fff;touch-action:none;display:block;}
  .sig-actions{display:flex;gap:8px;margin-top:10px;}
  .confirm{font-size:13px;color:var(--ink-soft);line-height:1.45;margin-bottom:14px;}
  @media(max-width:480px){
    .bar{padding:12px 14px;}
    .wrap{padding:18px 14px 80px;}
    .row2{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<header>
  <div class="bar">
    <a class="brand" href="app.html"><img class="brand-logo" src="compliAI-logo-reversed.svg" alt="CompliAI" /></a>
    <a id="backLink" href="app.html">← Back to the plan</a>
  </div>
</header>
<div class="wrap">
  <div id="loading" class="sub">Loading…</div>
  <div id="form" class="hide">
    <h1>SSSP sign-off</h1>
    <p class="sub" id="jobName">—</p>
    <div class="card">
      <p class="confirm">By signing below I confirm I have read and understood the Site-Specific Safety Plan for this job, including the hazards and controls, before starting work.</p>
      <div class="row2">
        <div class="field"><label>Your name</label><input type="text" id="name" placeholder="Full name" /></div>
        <div class="field"><label>Role / company</label><input type="text" id="role" placeholder="e.g. Roofer — ABC Ltd" /></div>
      </div>
      <div class="field"><label>Date</label><input type="date" id="date" /></div>
      <div class="field">
        <label>Signature</label>
        <canvas id="sigCanvas" class="sig-canvas"></canvas>
        <div class="sig-actions"><button class="btn alt mini" type="button" id="sigClear">Clear</button></div>
      </div>
      <button class="btn" id="submitBtn">Sign &amp; confirm</button>
      <div id="msg" class="hide"></div>
    </div>
  </div>
  <div id="done" class="hide">
    <div class="card ok-screen">
      <div class="tick">✓</div>
      <h1>Sign-off recorded</h1>
      <p class="sub" id="doneMsg"></p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:10px;">
        <button class="btn alt" style="width:auto;" id="anotherBtn">Sign another</button>
        <a class="btn" style="width:auto;text-decoration:none;display:inline-block;" id="toJob">Back to the plan</a>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb=supabase.createClient("https://qewsprapekvvtlsbyaed.supabase.co","sb_publishable_otdr8vJvfweQ8yjlYD8rvg_LS1EvYqT");
const jobId=new URLSearchParams(location.search).get("job");
function show(id,on){document.getElementById(id).classList.toggle("hide",!on);}

/* ---- reusable signature pad (canvas, no library) ---- */
function makeSignaturePad(canvas){
  const ctx=canvas.getContext("2d"); let drawing=false, dirty=false;
  function size(){const r=canvas.getBoundingClientRect();const d=window.devicePixelRatio||1;canvas.width=r.width*d;canvas.height=r.height*d;ctx.setTransform(1,0,0,1,0,0);ctx.scale(d,d);ctx.lineWidth=2.2;ctx.lineCap="round";ctx.lineJoin="round";ctx.strokeStyle="#1A1B17";}
  function pos(e){const r=canvas.getBoundingClientRect();const t=e.touches&&e.touches[0];const cx=t?t.clientX:e.clientX,cy=t?t.clientY:e.clientY;return{x:cx-r.left,y:cy-r.top};}
  function start(e){drawing=true;dirty=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);}
  function move(e){if(!drawing)return;e.preventDefault();const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();}
  function end(){drawing=false;}
  canvas.addEventListener("mousedown",start);canvas.addEventListener("mousemove",move);window.addEventListener("mouseup",end);
  canvas.addEventListener("touchstart",start,{passive:false});canvas.addEventListener("touchmove",move,{passive:false});canvas.addEventListener("touchend",end);
  return{ resize:size, clear:function(){ctx.clearRect(0,0,canvas.width,canvas.height);dirty=false;}, isEmpty:function(){return !dirty;}, toDataURL:function(){return canvas.toDataURL("image/png");} };
}

document.getElementById("backLink").href="sssp-builder.html?job="+jobId;
document.getElementById("toJob").href="sssp-builder.html?job="+jobId;

let sigPad=null;
async function init(){
  if(!jobId){document.getElementById("loading").textContent="No job specified.";return;}
  const {data:{session}}=await sb.auth.getSession();
  if(!session){location.href="app.html";return;}
  const {data,error}=await sb.from("jobs").select("title").eq("id",jobId).single();
  if(error||!data){document.getElementById("loading").textContent="Couldn't open this job.";return;}
  document.getElementById("jobName").textContent=data.title||"Job";
  document.getElementById("date").value=new Date().toISOString().slice(0,10);
  show("loading",false);show("form",true);
  sigPad=makeSignaturePad(document.getElementById("sigCanvas"));
  requestAnimationFrame(()=>{sigPad.resize();});
}
window.addEventListener("resize",()=>{if(sigPad){sigPad.resize();sigPad.clear();}});
window.addEventListener("orientationchange",()=>{if(sigPad){sigPad.resize();sigPad.clear();}});
document.getElementById("sigClear").addEventListener("click",()=>sigPad&&sigPad.clear());
document.getElementById("submitBtn").addEventListener("click",async()=>{
  const name=document.getElementById("name").value.trim();
  const role=document.getElementById("role").value.trim();
  const msg=document.getElementById("msg");
  if(!name){msg.className="err";msg.textContent="Enter your name.";show("msg",true);return;}
  if(!sigPad||document.getElementById("sigCanvas").clientWidth===0||sigPad.isEmpty()){msg.className="err";msg.textContent="Please add a signature.";show("msg",true);return;}
  show("msg",false);
  const btn=document.getElementById("submitBtn");btn.disabled=true;btn.textContent="Saving…";
  const payload={name,role,date:document.getElementById("date").value,signature:sigPad.toDataURL()};
  const {data:{session}}=await sb.auth.getSession();
  if(!session||!session.user){btn.disabled=false;btn.textContent="Sign & confirm";msg.className="err";msg.textContent="Your session expired — please open the sign-in link again.";show("msg",true);return;}
  const {error}=await sb.from("records").insert({job_id:jobId,type:"signoff",payload,created_by:session.user.id});
  btn.disabled=false;btn.textContent="Sign & confirm";
  if(error){msg.className="err";msg.textContent="Couldn't save: "+error.message;show("msg",true);return;}
  document.getElementById("doneMsg").textContent=name+" — signed and confirmed.";
  show("form",false);show("done",true);window.scrollTo(0,0);
});
document.getElementById("anotherBtn").addEventListener("click",()=>location.reload());
init();
</script>
</body>
</html>
