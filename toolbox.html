<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>CompliAI — Toolbox talk</title>
<link rel="icon" href="favicon.svg?v=2" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--paper:#F3F3EF;--surface:#FFFFFF;--ink:#1A1B17;--ink-soft:#62655C;--line:#E3E3DB;--hazard:#E2540B;--hazard-tint:#FBEDE3;--steel:#243137;--brand:#0F766E;--brand-deep:#0B5A54;--brand-tint:#E6F2F0;--good:#2F6B4F;}
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;}
  .display{font-family:'Archivo',sans-serif;}
  header{position:sticky;top:0;z-index:40;background:var(--steel);color:#fff;border-bottom:3px solid var(--brand);}
  .bar{max-width:640px;margin:0 auto;padding:13px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;}
  .brand-logo{height:26px;width:auto;display:block;}
  .bar a{color:#C3CDD2;text-decoration:none;font-size:13px;}
  .wrap{max-width:640px;margin:0 auto;padding:22px 18px 90px;}
  h1{font-family:'Archivo';font-weight:800;font-size:22px;margin:0 0 4px;}
  .sub{color:var(--ink-soft);font-size:14px;margin:0 0 20px;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px;}
  label{display:block;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px;}
  input,select,textarea{width:100%;font-family:inherit;font-size:16px;padding:12px 13px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--brand);border-color:var(--brand);}
  textarea{min-height:80px;resize:vertical;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .field{margin-bottom:14px;}
  .btn{font-family:'Archivo';font-weight:700;font-size:15px;background:var(--brand);color:#fff;border:none;border-radius:10px;padding:14px 18px;cursor:pointer;width:100%;}
  .btn:hover{filter:brightness(1.06);}
  .btn:disabled{opacity:.6;}
  .btn.alt{background:transparent;color:var(--brand-deep);border:1.5px solid var(--line);}
  .err{background:var(--hazard-tint);color:#9a3a08;border-radius:10px;padding:12px 14px;font-size:14px;margin-top:12px;}
  .hide{display:none;}
  .ok-screen{text-align:center;padding:30px 10px;}
  .ok-screen .tick{font-size:44px;color:var(--good);}
  /* signature collection */
  .sig-list{display:flex;flex-direction:column;gap:8px;}
  .sig-item{display:flex;align-items:center;justify-content:space-between;gap:10px;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:#FCFCFB;}
  .sig-item .nm{font-size:14px;font-weight:600;min-width:0;word-break:break-word;}
  .sig-item .right{display:flex;align-items:center;gap:8px;flex:none;}
  .sig-item img{height:32px;width:auto;border:1px solid var(--line);border-radius:6px;background:#fff;}
  .sig-item .signed{color:var(--good);font-size:13px;font-weight:600;}
  .btn.mini{width:auto;padding:8px 13px;font-size:13px;}
  .sig-empty{color:var(--ink-soft);font-size:13px;border:1.5px dashed var(--line);border-radius:10px;padding:16px;text-align:center;}
  /* signature pad modal */
  .sig-modal{position:fixed;inset:0;background:rgba(26,27,23,.55);z-index:60;display:flex;align-items:center;justify-content:center;padding:18px;}
  .sig-modal .box{background:#fff;border-radius:14px;padding:18px;width:100%;max-width:440px;}
  .sig-modal h3{font-family:'Archivo';font-weight:800;font-size:17px;margin:0 0 4px;}
  .sig-modal .who{color:var(--ink-soft);font-size:13px;margin:0 0 12px;}
  .sig-canvas{width:100%;height:170px;border:1.5px dashed var(--line);border-radius:10px;background:#fff;touch-action:none;display:block;}
  .sig-actions{display:flex;gap:8px;margin-top:12px;}
  @media(max-width:480px){
    .bar{padding:12px 14px;}
    .wrap{padding:18px 14px 80px;}
    .row2{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<header>
  <div class="bar">
    <a class="brand" href="app.html"><img class="brand-logo" src="compliAI-logo-reversed.svg" alt="CompliAI" /></a>
    <a id="backLink" href="app.html">← Back to job</a>
  </div>
</header>
<div class="wrap">
  <div id="loading" class="sub">Loading…</div>
  <div id="form" class="hide">
    <h1>Toolbox talk</h1>
    <p class="sub" id="jobName">—</p>
    <div class="card">
      <div class="row2">
        <div class="field"><label>Date</label><input type="date" id="date" /></div>
        <div class="field"><label>Presenter</label><input type="text" id="presenter" placeholder="Who ran it" /></div>
      </div>
      <div class="field"><label>Topic</label><input type="text" id="topic" placeholder="e.g. Working at height — edge protection" /></div>
      <div class="field"><label>Key points discussed</label><textarea id="points" placeholder="What was covered"></textarea></div>
      <div class="field"><label>Attendees (one name per line)</label><textarea id="attendees" placeholder="Each person on a new line"></textarea></div>
      <div class="field">
        <label>Collect signatures</label>
        <button class="btn alt mini" type="button" id="collectBtn">Load names to sign</button>
        <div id="sigList" class="sig-list" style="margin-top:10px;"></div>
      </div>
      <div class="field"><label>Actions / follow-ups</label><textarea id="actions" placeholder="Anything to follow up (optional)"></textarea></div>
      <button class="btn" id="submitBtn">Save toolbox talk to this job</button>
      <div id="msg" class="hide"></div>
    </div>
  </div>
  <div id="done" class="hide">
    <div class="card ok-screen">
      <div class="tick">✓</div>
      <h1>Toolbox talk saved</h1>
      <p class="sub" id="doneMsg"></p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:10px;">
        <button class="btn alt" style="width:auto;" id="anotherBtn">Log another</button>
        <a class="btn" style="width:auto;text-decoration:none;display:inline-block;" id="toJob">Back to the plan</a>
      </div>
    </div>
  </div>
</div>
<!-- signature pad modal (shared) -->
<div id="sigModal" class="sig-modal hide">
  <div class="box">
    <h3>Signature</h3>
    <p class="who" id="sigWho">—</p>
    <canvas id="sigCanvas" class="sig-canvas"></canvas>
    <div class="sig-actions">
      <button class="btn alt mini" type="button" id="sigClear">Clear</button>
      <button class="btn alt mini" type="button" id="sigCancel">Cancel</button>
      <button class="btn mini" type="button" id="sigSave" style="margin-left:auto;">Save signature</button>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb=supabase.createClient("https://qewsprapekvvtlsbyaed.supabase.co","sb_publishable_otdr8vJvfweQ8yjlYD8rvg_LS1EvYqT");
const jobId=new URLSearchParams(location.search).get("job");
function show(id,on){document.getElementById(id).classList.toggle("hide",!on);}

/* ---- reusable signature pad (canvas, no library) ---- */
function makeSignaturePad(canvas){
  const ctx=canvas.getContext("2d"); let drawing=false, dirty=false;
  function size(){const r=canvas.getBoundingClientRect();const d=window.devicePixelRatio||1;canvas.width=r.width*d;canvas.height=r.height*d;ctx.setTransform(1,0,0,1,0,0);ctx.scale(d,d);ctx.lineWidth=2.2;ctx.lineCap="round";ctx.lineJoin="round";ctx.strokeStyle="#1A1B17";}
  function pos(e){const r=canvas.getBoundingClientRect();const t=e.touches&&e.touches[0];const cx=t?t.clientX:e.clientX,cy=t?t.clientY:e.clientY;return{x:cx-r.left,y:cy-r.top};}
  function start(e){drawing=true;dirty=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);}
  function move(e){if(!drawing)return;e.preventDefault();const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();}
  function end(){drawing=false;}
  canvas.addEventListener("mousedown",start);canvas.addEventListener("mousemove",move);window.addEventListener("mouseup",end);
  canvas.addEventListener("touchstart",start,{passive:false});canvas.addEventListener("touchmove",move,{passive:false});canvas.addEventListener("touchend",end);
  return{ resize:size, clear:function(){ctx.clearRect(0,0,canvas.width,canvas.height);dirty=false;}, isEmpty:function(){return !dirty;}, toDataURL:function(){return canvas.toDataURL("image/png");} };
}

document.getElementById("backLink").href="sssp-builder.html?job="+jobId;
document.getElementById("toJob").href="sssp-builder.html?job="+jobId;
async function init(){
  if(!jobId){document.getElementById("loading").textContent="No job specified.";return;}
  const {data:{session}}=await sb.auth.getSession();
  if(!session){location.href="app.html";return;}
  const {data,error}=await sb.from("jobs").select("title").eq("id",jobId).single();
  if(error||!data){document.getElementById("loading").textContent="Couldn't open this job.";return;}
  document.getElementById("jobName").textContent=data.title||"Job";
  const d=new Date();const localDate=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  document.getElementById("date").value=localDate;
  show("loading",false);show("form",true);
}
/* ---- collect signatures flow ---- */
let sigs={};            // name -> {dataUrl, signedAt}
let sigNames=[];        // ordered list of names shown
let sigPad=null, sigActiveName=null;
function attendeeNames(){return document.getElementById("attendees").value.split("\n").map(s=>s.trim()).filter(Boolean);}
function renderSigList(){
  const wrap=document.getElementById("sigList");
  if(!sigNames.length){wrap.innerHTML='<div class="sig-empty">Enter attendee names above, then tap "Load names to sign".</div>';return;}
  wrap.innerHTML=sigNames.map((nm,i)=>{
    const s=sigs[nm];
    const right=s?`<img src="${s.dataUrl}" alt="signature"/><span class="signed">✓</span><button class="btn alt mini" type="button" data-sign="${i}">Redo</button>`
                 :`<button class="btn mini" type="button" data-sign="${i}">Sign</button>`;
    return `<div class="sig-item"><span class="nm"></span><span class="right">${right}</span></div>`;
  }).join("");
  // set names safely (avoid HTML injection)
  wrap.querySelectorAll(".sig-item .nm").forEach((el,i)=>{el.textContent=sigNames[i];});
  wrap.querySelectorAll("[data-sign]").forEach(b=>b.addEventListener("click",()=>openSig(sigNames[+b.getAttribute("data-sign")])));
}
document.getElementById("collectBtn").addEventListener("click",()=>{
  sigNames=attendeeNames();
  renderSigList();
});
function openSig(name){
  sigActiveName=name;
  document.getElementById("sigWho").textContent=name;
  show("sigModal",true);
  if(!sigPad)sigPad=makeSignaturePad(document.getElementById("sigCanvas"));
  requestAnimationFrame(()=>{sigPad.resize();sigPad.clear();});
}
window.addEventListener("resize",()=>{if(sigPad&&!document.getElementById("sigModal").classList.contains("hide")){sigPad.resize();sigPad.clear();}});
window.addEventListener("orientationchange",()=>{if(sigPad&&!document.getElementById("sigModal").classList.contains("hide")){sigPad.resize();sigPad.clear();}});
document.getElementById("sigClear").addEventListener("click",()=>sigPad&&sigPad.clear());
document.getElementById("sigCancel").addEventListener("click",()=>show("sigModal",false));
document.getElementById("sigSave").addEventListener("click",()=>{
  if(!sigPad||document.getElementById("sigCanvas").clientWidth===0||sigPad.isEmpty()){alert("Please add a signature.");return;}
  sigs[sigActiveName]={dataUrl:sigPad.toDataURL(),signedAt:new Date().toISOString()};
  show("sigModal",false);
  renderSigList();
});

document.getElementById("submitBtn").addEventListener("click",async()=>{
  const topic=document.getElementById("topic").value.trim();
  const presenter=document.getElementById("presenter").value.trim();
  const msg=document.getElementById("msg");
  if(!topic){msg.className="err";msg.textContent="Enter a topic.";show("msg",true);return;}
  const btn=document.getElementById("submitBtn");btn.disabled=true;btn.textContent="Saving…";
  const attendees=document.getElementById("attendees").value.split("\n").map(s=>s.trim()).filter(Boolean);
  const signatures=attendees.filter(nm=>sigs[nm]).map(nm=>({name:nm,dataUrl:sigs[nm].dataUrl,signedAt:sigs[nm].signedAt}));
  const payload={date:document.getElementById("date").value,topic,presenter,points:document.getElementById("points").value.trim(),attendees,signatures,actions:document.getElementById("actions").value.trim()};
  const {data:{session}}=await sb.auth.getSession();
  if(!session||!session.user){btn.disabled=false;btn.textContent="Save toolbox talk to this job";msg.className="err";msg.textContent="Your session expired — please open the sign-in link again.";show("msg",true);return;}
  const {error}=await sb.from("records").insert({job_id:jobId,type:"toolbox_talk",payload,created_by:session.user.id});
  btn.disabled=false;btn.textContent="Save toolbox talk to this job";
  if(error){msg.className="err";msg.textContent="Couldn't save: "+error.message;show("msg",true);return;}
  document.getElementById("doneMsg").textContent=topic+" — "+attendees.length+" attendee(s) — saved.";
  show("form",false);show("done",true);window.scrollTo(0,0);
});
document.getElementById("anotherBtn").addEventListener("click",()=>location.reload());
init();
</script>
</body>
</html>
